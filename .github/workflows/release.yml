name: Release Validation

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-tag:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SITE_URL: ${{ secrets.SITE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RELEASE_TAG: ${{ github.ref_name }}
      CI_SEED: teamframe-release-v2
      CI_MODE: deterministic
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate tag format
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must be semver-like: vMAJOR.MINOR.PATCH"
            exit 1
          fi

      - name: Validate required CI secrets
        shell: bash
        run: |
          set -euo pipefail
          required=(
            NEXT_PUBLIC_SUPABASE_URL
            NEXT_PUBLIC_SUPABASE_ANON_KEY
            SITE_URL
            SUPABASE_SERVICE_ROLE_KEY
            SUPABASE_DB_URL
            OPENAI_API_KEY
          )

          for var in "${required[@]}"; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required secret: $var"
              exit 1
            fi
          done

      - name: Install dependencies
        run: npm ci

      - name: Initialize deterministic seed context
        shell: bash
        run: |
          set -euo pipefail
          echo "CI_SEED=${CI_SEED}" >> "$GITHUB_ENV"
          echo "CI_MODE=${CI_MODE}" >> "$GITHUB_ENV"
          echo "CI_RUN_ID=release-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"
          echo "SEED=${CI_SEED}" >> "$GITHUB_ENV"
          echo "RUN_MODE=${CI_MODE}" >> "$GITHUB_ENV"
          echo "TEST_RUN_ID=release-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"
          echo "TEST_TENANT_SEED=${CI_SEED}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"

      - name: Gate Chain - run ci:full
        run: npm run ci:full

      - name: Upload replay artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-replay-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci/replays/**
          if-no-files-found: ignore

      - name: Release validation summary
        shell: bash
        run: |
          {
            echo "## Release Validation"
            echo "- Tag: ${RELEASE_TAG}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Result: PASS"
            echo "- Gate chain: strict sequential execution enforced"
            echo "- Mode: ${CI_MODE}"
            echo "- Seed: ${CI_SEED}"
            echo "- Test Run ID: ${CI_RUN_ID}"
            echo "- Test Tenant Seed: ${TEST_TENANT_SEED}"
          } >> "$GITHUB_STEP_SUMMARY"