name: Release Validation

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-tag:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SITE_URL: ${{ secrets.SITE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_CI }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL_CI }}
      SUPABASE_DB_URL_CI: ${{ secrets.SUPABASE_DB_URL_CI }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RELEASE_TAG: ${{ github.ref_name }}
      SEED: teamframe-release-v2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate tag format
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must be semver-like: vMAJOR.MINOR.PATCH"
            exit 1
          fi

      - name: Validate required CI secrets
        shell: bash
        run: |
          set -euo pipefail
          required=(
            NEXT_PUBLIC_SUPABASE_URL
            NEXT_PUBLIC_SUPABASE_ANON_KEY
            SITE_URL
            SUPABASE_SERVICE_ROLE_KEY_CI
            SUPABASE_DB_URL_CI
            OPENAI_API_KEY
          )

          for var in "${required[@]}"; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required secret: $var"
              exit 1
            fi
          done

      - name: Install dependencies
        run: npm ci

      - name: Capture schema state hash
        run: node scripts/schema-state.mjs

      - name: Upload schema state artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-schema-state-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci/schema-state/schema-state.json
          if-no-files-found: error

      - name: Reliability helper self-test
        run: node scripts/verify-reliability-selftest.mjs

      - name: Initialize deterministic seed context
        shell: bash
        run: |
          set -euo pipefail
          echo "SEED=${SEED}" >> "$GITHUB_ENV"
          echo "TEST_RUN_ID=release-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"
          echo "TEST_TENANT_SEED=${SEED}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"

      - name: Gate 1 - db:apply
        run: npm run db:apply

      - name: Gate 2 - db:test:rls
        run: npm run db:test:rls

      - name: Gate 3 - db:test:stale
        run: npm run db:test:stale

      - name: Gate 4 - test:employees
        run: npm run test:employees

      - name: Gate 5 - test:security
        run: npm run test:security

      - name: Gate 6 - test:reliability
        run: npm run test:reliability

      - name: Gate 7 - typecheck
        run: npm run typecheck

      - name: Gate 8 - lint
        run: npm run lint

      - name: Gate 9 - build
        run: npm run build

      - name: Upload replay artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-replay-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/replay/*.json
          if-no-files-found: ignore

      - name: Release validation summary
        shell: bash
        run: |
          {
            echo "## Release Validation"
            echo "- Tag: ${RELEASE_TAG}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Result: PASS"
            echo "- Gate chain: strict sequential execution enforced"
            echo "- Seed: ${SEED}"
            echo "- Test Run ID: ${TEST_RUN_ID}"
            echo "- Test Tenant Seed: ${TEST_TENANT_SEED}"
          } >> "$GITHUB_STEP_SUMMARY"