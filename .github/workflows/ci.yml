name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate-chain:
    name: Gate Chain (Strict)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SITE_URL: ${{ secrets.SITE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_CI }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL_CI }}
      SUPABASE_DB_URL_CI: ${{ secrets.SUPABASE_DB_URL_CI }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SEED: teamframe-ci-v2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate required CI secrets
        shell: bash
        run: |
          set -euo pipefail
          required=(
            NEXT_PUBLIC_SUPABASE_URL
            NEXT_PUBLIC_SUPABASE_ANON_KEY
            SITE_URL
            SUPABASE_SERVICE_ROLE_KEY_CI
            SUPABASE_DB_URL_CI
            OPENAI_API_KEY
          )

          for var in "${required[@]}"; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required secret: $var"
              exit 1
            fi
          done

      - name: Diagnostic - print CI DB host only
        shell: bash
        run: |
          set -euo pipefail
          node -e "const u=new URL(process.env.SUPABASE_DB_URL.replace(/^\"|\"$/g,'')); console.log('CI_DB_HOST='+u.hostname)"

      - name: Install dependencies
        run: npm ci

      - name: Capture schema state hash
        run: node scripts/schema-state.mjs

      - name: Upload schema state artifact
        uses: actions/upload-artifact@v4
        with:
          name: schema-state-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci/schema-state/schema-state.json
          if-no-files-found: error

      - name: Upload phase-0 reproduction artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phase-0-repro-${{ github.run_id }}-${{ github.run_attempt }}
          path: remediation/phase-0/outputs/**
          if-no-files-found: ignore

      - name: Reliability helper self-test
        run: node scripts/verify-reliability-selftest.mjs

      - name: Initialize deterministic seed context
        shell: bash
        run: |
          set -euo pipefail
          echo "SEED=${SEED}" >> "$GITHUB_ENV"
          echo "TEST_RUN_ID=gh-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"

      - name: Configure DB isolation context
        shell: bash
        run: |
          set -euo pipefail
          echo "TEST_TENANT_SEED=${SEED}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"

      - name: Gate 1 - db:apply
        run: npm run db:apply

      - name: Gate 2 - db:test:rls
        run: npm run db:test:rls

      - name: Gate 3 - db:test:stale
        run: npm run db:test:stale

      - name: Gate 4 - test:employees
        run: npm run test:employees

      - name: Gate 5 - test:security
        run: npm run test:security

      - name: Gate 6 - test:reliability
        run: npm run test:reliability

      - name: Gate 7 - typecheck
        run: npm run typecheck

      - name: Gate 8 - lint
        run: npm run lint

      - name: Gate 9 - build
        run: npm run build

      - name: Upload replay artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: replay-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/replay/*.json
          if-no-files-found: ignore

      - name: CI summary
        if: always()
        shell: bash
        run: |
          {
            echo "## CI Hardening Summary"
            echo "- Workflow: Gate Chain (Strict)"
            echo "- Seed: ${SEED}"
            echo "- Test Run ID: ${TEST_RUN_ID}"
            echo "- Test Tenant Seed: ${TEST_TENANT_SEED}"
            echo "- Result: ${{ job.status }}"
            if [ "${{ job.status }}" != "success" ]; then
              echo "- Replay artifacts: uploaded if present in artifacts/replay"
            fi
          } >> "$GITHUB_STEP_SUMMARY"