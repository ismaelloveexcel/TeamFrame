name: Remediation Freeze Guard

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  freeze-guard:
    name: Freeze Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce remediation freeze scope
        shell: bash
        run: |
          set -euo pipefail

          # Hard Stop Governance:
          # No new feature/domain work until Phase 1 + Phase 2 gates are complete,
          # CI isolation is verified, and reliability helpers are fail-capable.
          # Use `unfreeze:` only for explicitly approved remediation exceptions.

          title="${{ github.event.pull_request.title }}"
          body="${{ github.event.pull_request.body }}"
          if [[ "$title" == *"unfreeze:"* ]] || [[ "$body" == *"unfreeze:"* ]]; then
            echo "unfreeze override present; freeze guard bypassed"
            exit 0
          fi

          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          mapfile -t files < <(git diff --name-only "$base" "$head")
          mapfile -t name_status < <(git diff --name-status "$base" "$head")

          blocked_regex='^(schemas/|services/.+/|components/.+/|app/.+/|lib/ai/|domains/)'
          allowed_service_regex='^(services/(employeeService|validationService)/|services/(documentService|leaveService)/)'

          violations=0
          for f in "${files[@]}"; do
            [[ -z "$f" ]] && continue

            if [[ "$f" =~ $blocked_regex ]]; then
              if [[ "$f" =~ $allowed_service_regex ]]; then
                # Existing services may be edited for remediation, but adding new files in these domains is blocked.
                for row in "${name_status[@]}"; do
                  IFS=$'\t' read -r status changed_path _ <<< "$row"
                  if [[ "$status" == A* ]] && [[ "$changed_path" == "$f" ]]; then
                    echo "blocked (new file in remediation-sensitive service path): $f"
                    violations=1
                    break
                  fi
                done
                continue
              fi

              # Allow docs and workflows required for remediation governance.
              if [[ "$f" =~ ^docs/remediation- ]] || [[ "$f" =~ ^\.github/workflows/remediation- ]]; then
                continue
              fi

              echo "blocked by remediation freeze: $f"
              violations=1
            fi
          done

          if [[ $violations -ne 0 ]]; then
            echo "Freeze guard failed. Add 'unfreeze:' in PR title/body with reviewer approval if this change is required."
            exit 1
          fi

          echo "Freeze guard passed."
